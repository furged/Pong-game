<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="arena-wrapper">
            <div id="gameWrapper">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                
                <!-- Mobile touch controls - OUTSIDE the canvas -->
                <div id="touch-left" class="touch-zone">
                    <div class="touch-label">▲</div>
                    <div class="touch-label">▼</div>
                </div>
                <div id="touch-right" class="touch-zone">
                    <div class="touch-label">▲</div>
                    <div class="touch-label">▼</div>
                </div>
                
                <!-- Mobile controls overlay -->
                <div id="mobile-controls">
                    <button class="mobile-btn" id="mobilePause">⏸</button>
                    <button class="mobile-btn" id="mobileRestart">↻</button>
                    <button class="mobile-btn" id="mobileMenu">☰</button>
                </div>
                
                <div id="menu-overlay" class="overlay">
                    <h1>PONG</h1>
                    <p>Classic Pong</p>
                    <button class="menu-btn" onclick="startGame('single')">PLAY VS BOT</button>
                    <button class="menu-btn" onclick="startGame('multi')">MULTIPLAYER</button>
                    <button class="menu-btn settings-btn" onclick="toggleSettings()">⚙️ SETTINGS</button>
                </div>

                <div id="settings-overlay" class="overlay" style="display:none;">
                    <h2>⚙️ Settings</h2>
                    <div class="setting-group">
                        <label>Points to Win</label>
                        <select id="winScoreSelect">
                            <option value="3">3</option>
                            <option value="5" selected>5</option>
                            <option value="7">7</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="21">21</option>
                            <option value="0">∞ Infinite</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Paddle 1 Color</label>
                        <input type="color" id="colorPaddleA" value="#00f3ff">
                    </div>
                    <div class="setting-group">
                        <label>Paddle 2 Color</label>
                        <input type="color" id="colorPaddleB" value="#ff0040">
                    </div>
                    <div class="setting-group">
                        <label>Ball Color</label>
                        <input type="color" id="colorBall" value="#ffffff">
                    </div>
                    <div class="setting-group">
                        <label>Background Color</label>
                        <input type="color" id="colorBg" value="#000000">
                    </div>
                    <button class="menu-btn back-btn" onclick="toggleSettings()">CLOSE</button>
                </div>
            </div>
            
            <div class="control-bar">
                <span id="score-display" class="mono-text">P1: 0 | P2: 0</span>
                <span id="win-target" class="mono-text">Target: 5</span>
                <span id="frame-count" class="mono-text">Frames: 0</span>
            </div>
        </div>

        <div class="dashboard-wrapper">
            <div class="dashboard-header">
                <h3>GAME INFO</h3>
                <div class="status-badge" id="game-status">● READY</div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card"><label>Mode</label><span id="game-mode">-</span></div>
                <div class="metric-card"><label>Games Played</label><span id="games-played">0</span></div>
                <div class="metric-card"><label>Longest Rally</label><span id="longest-rally">0</span></div>
                <div class="metric-card"><label>Controls</label><span id="controls-info">P1: W/S | P2: ↑/↓</span></div>
            </div>

            <div class="viz-wrapper">
                <h4>CONTROLS</h4>
                <div class="controls-box">
                    <div><strong>Desktop:</strong> P1: W/S | P2: ↑/↓</div>
                    <div><strong>Mobile:</strong> Touch left/right edges of screen</div>
                    <div><strong>Game:</strong> P (pause) / R (restart) / M (menu)</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
